services:
  postgres:
    image: postgres:15-alpine
    container_name: msf-postgres
    environment:
      POSTGRES_DB: msf_customer
      POSTGRES_USER: msf_user
      POSTGRES_PASSWORD: msf_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

